<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/typography.css') }}">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | QR Access</title>

  <style>
    body {
      
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
    }

    .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      padding: 30px;
      border-radius: 20px;
      width: 400px;
      color: white;
    }

    input,
    button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
    }

    input {
      background: rgba(255, 255, 255, 0.1);
      color: white;
    }

    button {
      background: linear-gradient(135deg, #00d4ff, #9333ea);
      color: white;
      cursor: pointer;
    }

    /* steps */
    .step {
      display: none;
    }

    .step.active {
      display: block;
    }

    /* alert */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-box {
      background: #1a1a2e;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- STEP 1 -->
    <div class="step active" id="step1">
      <h2>Email</h2>
      <input type="email" id="email" placeholder="Enter email">
      <button id="nextBtn">Send OTP</button>
    </div>

    <!-- STEP 2 -->
    <div class="step" id="step2">
      <h2>OTP</h2>
      <input type="text" id="otp" maxlength="4" placeholder="Enter 4-Digit OTP">
      <button id="verifyOtp">Verify OTP</button>
    </div>

    <!-- STEP 3 -->
    <div class="step" id="step3">
      <h2>New Password</h2>
      <input type="password" id="newPass" placeholder="New Password">
      <button id="resetBtn">Reset Password</button>
    </div>

  </div>

  <!-- ALERT -->
  <div class="modal-overlay" id="alertModal">
    <div class="modal-box">
      <p id="alertText"></p>
      <button onclick="closeAlert()">OK</button>
    </div>
  </div>

  <script>
    let userEmail = "";

    function showAlert(msg) {
      document.getElementById("alertText").innerText = msg;
      document.getElementById("alertModal").classList.add("active");
    }
    function closeAlert() {
      document.getElementById("alertModal").classList.remove("active");
    }

    function showStep(id) {
      document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
      document.getElementById(id).classList.add("active");
    }

    /* SEND OTP */
    nextBtn.onclick = async () => {
      userEmail = document.getElementById("email").value.trim();

      if (!userEmail) return showAlert("Enter email");

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(userEmail)) return showAlert("Enter a valid email address");

      let res = await fetch('/send-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: userEmail })
      });

      if (res.ok) {
        showAlert("OTP sent (check your mail)");
        showStep("step2");
      } else {
        showAlert("Error sending OTP");
      }
    }

    /* VERIFY OTP */
    verifyOtp.onclick = async () => {
      let otp = document.getElementById("otp").value;

      let res = await fetch('/verify-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: userEmail, otp: otp })
      });

      let msg = await res.text();

      if (res.ok) {
        showAlert("OTP Verified");
        showStep("step3");
      } else {
        showAlert(msg);
      }
    }

    /* RESET PASSWORD */
    resetBtn.onclick = async () => {
      let pass = document.getElementById("newPass").value;

      let res = await fetch('/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: userEmail, password: pass })
      });

      if (res.ok) {
        showAlert("Password Updated");
        setTimeout(() => window.location.href = "/", 1500);
      } else {
        showAlert("Error");
      }
    }
  </script>

</body>

</html>
