<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/typography.css') }}">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<style>
body {
    height: 100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
    
}

.box {
    width:350px;
    padding:30px;
    border-radius:25px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(20px);
    color:white;
}

.hero-icon img {
    width: 40%;   /* adjust based on your logo */
    height: auto;
    object-fit: contain;
}

input {
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.2);
    background:transparent;
    color:white;
}

button {
    width:100%;
    padding:12px;
    border:none;
    border-radius:20px;
    background: linear-gradient(135deg, #00d4ff, #9333ea);
    color:white;
}
</style>
</head>

<body>

<div class="box">
    <div class="hero-icon">
        <img src="{{ url_for('static', filename='images/sk.png') }}" alt="Logo">
    </div>
<h2><b>Admin Login</b></h2>


<form id="adminForm" action="/admin-login" method="post">
<input type="email" id="email" name="email" placeholder="Admin Email" required>
<input type="password" id="password" name="password" placeholder="Password" required>

<button>Login</button>
</form>

<p id="msg"></p>

</div>


</body>
</html>
