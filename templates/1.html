<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/typography.css') }}">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Smart Printing | Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            padding: 40px 20px;
            gap: 30px;
        }

        /* CONTAINER */
        .container {
            width: 900px;
            height: 520px;
            display: flex;
            border-radius: 20px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
        }

        /* LEFT */
        .left {
            width: 55%;
            padding: 60px;
            text-align: center;
            color: #facc15;
        }

        .left p {
            margin-top: 10px;
            color: #ccc;
        }

        /* WELCOME VIDEO */
        .welcome-video {
            margin-top: 35px;
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(0, 212, 255, 0.25);
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.4s ease, border-color 0.4s ease;
            animation: videoFadeIn 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(15px);
        }

        .welcome-video:hover {
            transform: scale(1.03);
            box-shadow: 0 0 35px rgba(147, 51, 234, 0.4);
            border-color: rgba(147, 51, 234, 0.5);
        }

        .welcome-video video {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 15px;
        }

        @keyframes videoFadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* RIGHT */
        .right {
            width: 45%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* LOGIN BOX */
        .login-box {
            width: 100%;
            max-width: 350px;
            padding: 30px;
            border-radius: 25px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            color: white;
        }

        /* ICON */
        .hero-icon {
            width: 100px;
            height: 100px;
            margin: auto;
            overflow: hidden;
        }

        .hero-icon img {
            width: 120%;
        }

        /* TITLE */
        h2 {
            text-align: center;
            margin: 10px 0;
        }

        /* INPUT GROUP */
        .input-group {
            margin-bottom: 18px;
        }

        .input-wrapper {
            position: relative;
        }

        /* ✅ RESTORED INPUT STYLE */
        .input-wrapper input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            outline: none;
            transition: 0.3s;
        }

        /* Placeholder */
        .input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        /* Focus glow */
        .input-wrapper input:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        /* PASSWORD TOGGLE */
        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
        }

        /* OPTIONS */
        .options {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 15px;
        }

        .options a {
            color: #00d4ff;
            text-decoration: none;
        }

        /* BUTTON */
        .login-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #00d4ff, #9333ea);
            color: white;
            cursor: pointer;
        }

        /* ERROR MESSAGE */
        .message {
            margin-bottom: 10px;
            font-size: 13px;
            color: red;
            text-align: center;
        }

        /* TOGGLE SWITCH */
        .role-toggle-container {
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
        }

        .role-toggle {
            position: relative;
            display: flex;
            width: 220px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 30px;
            padding: 4px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .role-toggle input {
            display: none;
        }

        .slider {
            position: absolute;
            top: 4px;
            left: 4px;
            width: calc(50% - 4px);
            height: calc(100% - 8px);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .role-btn {
            flex: 1;
            text-align: center;
            padding: 8px 0;
            z-index: 1;
            font-size: 14px;
            font-weight: 600;
            color: #888;
            transition: color 0.3s;
        }

        .role-toggle input:checked~.slider {
            transform: translateX(100%);
        }

        .role-toggle input:checked~.role-admin {
            color: #00d4ff;
        }

        .role-toggle input:not(:checked)~.role-student {
            color: #00d4ff;
        }

        /* QR Code Access Container Styling */
        .qr-container {
            width: 100%;
            max-width: 900px;
            padding: 25px 40px;
            border-radius: 20px;
            background: rgba(88, 28, 135, 0.15); /* Deep purple background */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(250, 204, 21, 0.3); /* Gold accent border */
            box-shadow: 0 8px 32px 0 rgba(147, 51, 234, 0.2);
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 30px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .qr-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px 0 rgba(147, 51, 234, 0.35), 0 0 20px rgba(250, 204, 21, 0.25);
            border-color: rgba(250, 204, 21, 0.6);
        }

        .qr-content {
            flex: 1;
            text-align: left;
        }

        .qr-title {
            color: #facc15; /* Gold Accent */
            font-size: 1.45rem !important;
            font-weight: 800 !important;
            margin-bottom: 8px !important;
            text-shadow: 0 0 12px rgba(250, 204, 21, 0.25);
            letter-spacing: 0.5px;
        }

        .qr-subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem !important;
            line-height: 1.5 !important;
            font-weight: 400;
        }

        .qr-code-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 12px;
            border-radius: 16px;
            display: inline-block;
            border: 3px solid #facc15; /* Gold Accent */
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.2);
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }

        .qr-code-box:hover {
            transform: scale(1.05);
        }

        .qr-code-box img {
            width: 130px;
            height: 130px;
            display: block;
        }

        /* Responsive adjustments */
        @media (max-width: 940px) {
            body {
                padding: 30px 15px;
                gap: 20px;
            }
            .container {
                width: 100%;
                max-width: 900px;
                height: auto;
                flex-direction: column;
            }
            .left, .right {
                width: 100%;
                padding: 35px 25px;
            }
            .welcome-video {
                margin-top: 25px;
            }
            .qr-container {
                flex-direction: column-reverse;
                text-align: center;
                padding: 30px 20px;
                gap: 20px;
                width: 100%;
            }
            .qr-content {
                text-align: center;
            }
            .qr-title {
                font-size: 1.25rem !important;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- LEFT -->
        <div class="left">
            <h1>WELCOME TO</h1>
            <h1><b>QR SMART PRINTING</b></h1>
            <p>Experience futuristic printing with QR, AI & smart queue system.</p>
            
            <div class="welcome-video">
               <video autoplay muted loop playsinline>
                  <source src="{{ url_for('static', filename='video/login.mp4') }}" type="video/mp4">
               </video>
            </div>
        </div>

        <!-- RIGHT -->
        <div class="right">
            <div class="login-box">

                <div class="hero-icon">
                    <img src="{{ url_for('static', filename='images/sk.png') }}" alt="Logo">
                </div>

                <div class="role-toggle-container">
                    <label class="role-toggle">
                        <input type="checkbox" id="roleToggle">
                        <div class="slider"></div>
                        <div class="role-btn role-student">User</div>
                        <div class="role-btn role-admin">Admin</div>
                    </label>
                </div>

                <h2 id="formTitle">User Login</h2>

                <div id="message" class="message"></div>

                <!-- FORM -->
                <form id="loginForm">

                    <div class="input-group">
                        <div class="input-wrapper">
                            <input type="email" name="email" id="email" placeholder="Enter email" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <div class="input-wrapper">
                            <input type="password" name="password" id="password" placeholder="Enter password" required>
                            <span class="toggle-password" onclick="togglePassword()">👁️</span>
                        </div>
                    </div>

                    <div class="options">
                        <span><input type="checkbox"> Remember</span>
                        <a href="/forgot-password">Forgot?</a>
                    </div>

                    <button type="submit" class="login-btn">Login</button>
                    <p id="signupText" style="text-align:center; margin-top:12px; font-size:13px;">
                        Don't have an account?
                        <a href="/signup-page" style="color:#00d4ff;">Create one</a>
                    </p>

                </form>
            </div>
        </div>

    </div>

    <!-- QR CODE ACCESS CONTAINER -->
    <div class="qr-container">
        <div class="qr-content">
            <h3 class="qr-title">Scan QR Code to Access Smart Printing System</h3>
            <p class="qr-subtitle">Quick access to the secure login portal</p>
        </div>
        <div class="qr-code-box">
            <img src="{{ url_for('static', filename='images/login_qr.png') }}" alt="Login QR Code">
        </div>
    </div>

    <script>
        // 👁️ Toggle password
        function togglePassword() {
            const password = document.getElementById("password");
            const icon = document.querySelector(".toggle-password");

            if (password.type === "password") {
                password.type = "text";
                icon.textContent = "🙈";
            } else {
                password.type = "password";
                icon.textContent = "👁️";
            }
        }

        document.getElementById("roleToggle").addEventListener("change", function () {
            document.getElementById("formTitle").innerText = this.checked ? "Admin Login" : "User Login";
            document.getElementById("message").innerText = "";
            document.getElementById("signupText").style.display = this.checked ? "none" : "block";
        });

        // 🔥 LOGIN
        document.getElementById("loginForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const isAdmin = document.getElementById("roleToggle").checked;

            const url = isAdmin ? '/admin-login' : '/login';

            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            if (res.redirected) {
                window.location.href = res.url;
            } else {
                document.getElementById("message").innerText = "Invalid email or password";
            }
        });
    </script>

</body>

</html>
